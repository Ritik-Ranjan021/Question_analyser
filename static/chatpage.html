<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Qyro — Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --navy:      #0f1c38;
  --dark:      #0a1628;
  --darker:    #070f1e;
  --teal:      #0d9488;
  --teal2:     #14b8a6;
  --teal3:     #5eead4;
  --muted:     #94a3b8;
  --border:    rgba(13,148,136,.22);
  --panel-bg:  rgba(13,148,136,.06);
  --accent-line: linear-gradient(90deg, var(--teal), var(--teal2), transparent);
}

/* ─── RESET ───────────────────────────────────────────────── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--darker);
  color: #e2e8f0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── NOISE + GLOW LAYERS ─────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 55% at 25% 15%, rgba(13,148,136,.18) 0%, transparent 65%),
    radial-gradient(ellipse 55% 50% at 80% 75%, rgba(20,184,166,.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 60% 30%, rgba(15,28,56,.6) 0%, transparent 70%);
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  opacity: .045;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px 180px;
  pointer-events: none;
}

/* ─── NAV ─────────────────────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: .9rem 2rem;
  background: rgba(7,15,30,.85);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(14px);
}

.nav-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.05rem;
  color: #fff;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: .17rem;
  flex-shrink: 0;
}
.nav-logo span { color: var(--teal2); }

.logo-badge {
  font-family: 'DM Mono', monospace;
  font-size: .58rem;
  color: var(--teal3);
  background: rgba(13,148,136,.18);
  border: 1px solid rgba(13,148,136,.35);
  padding: .15rem .45rem;
  border-radius: 4px;
  letter-spacing: .04em;
}

.nav-right {
  display: flex; align-items: center; gap: 1rem;
}

.status-dot {
  display: flex; align-items: center; gap: .45rem;
  font-family: 'DM Mono', monospace;
  font-size: .7rem;
  color: var(--muted);
}
.status-dot::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--teal2);
  box-shadow: 0 0 6px var(--teal2);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.nav-cta {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: .82rem;
  background: linear-gradient(135deg, var(--teal), var(--teal2));
  color: var(--darker);
  padding: .45rem 1.1rem;
  border-radius: 6px;
  text-decoration: none;
  transition: opacity .2s, transform .15s;
}
.nav-cta:hover { opacity: .88; transform: translateY(-1px); }

/* ─── MAIN LAYOUT ─────────────────────────────────────────── */
.container {
  position: relative; z-index: 1;
  max-width: 820px;
  margin: 0 auto;
  padding: 100px 20px 60px;
}

/* ─── PAGE HEADER ─────────────────────────────────────────── */
.page-header {
  margin-bottom: 2rem;
  animation: fadeUp .5s ease both;
}

.page-header h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(1.4rem, 3vw, 1.7rem);
  letter-spacing: -.025em;
  line-height: 1.2;
  color: #fff;
}

.page-header p {
  font-size: .85rem;
  color: var(--muted);
  margin-top: .45rem;
  font-weight: 300;
}

/* ─── PANEL ───────────────────────────────────────────────── */
.panel {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  backdrop-filter: blur(16px);
  margin-bottom: 1.1rem;
  animation: fadeUp .5s ease both;
}

.panel:nth-child(2) { animation-delay: .08s; }
.panel:nth-child(3) { animation-delay: .16s; }

/* teal top-accent line */
.panel::before {
  content: '';
  display: block;
  height: 2px;
  background: var(--accent-line);
}

.panel-inner {
  padding: 1.2rem 1.4rem 1.4rem;
}

/* ─── SECTION LABELS (DM Mono + ── prefix) ────────────────── */
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  letter-spacing: .1em;
  color: var(--teal2);
  text-transform: uppercase;
  margin-bottom: .9rem;
  display: flex; align-items: center; gap: .5rem;
}

.section-label::before {
  content: '──';
  color: var(--teal);
  letter-spacing: -.05em;
}

/* ─── TEXTAREA ────────────────────────────────────────────── */
textarea {
  width: 100%;
  padding: .9rem 1rem;
  border-radius: 8px;
  background: rgba(7,15,30,.7);
  border: 1px solid rgba(255,255,255,.07);
  color: #e2e8f0;
  font-family: 'DM Sans', sans-serif;
  font-size: .92rem;
  font-weight: 400;
  resize: vertical;
  min-height: 110px;
  line-height: 1.6;
  transition: border-color .2s, box-shadow .2s;
}

textarea::placeholder { color: rgba(148,163,184,.45); }

textarea:focus {
  outline: none;
  border-color: rgba(20,184,166,.5);
  box-shadow: 0 0 0 3px rgba(20,184,166,.08);
}

.input-hint {
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  color: rgba(148,163,184,.4);
  text-align: right;
  margin-top: .4rem;
}

/* ─── ATTACHMENTS BAR ─────────────────────────────────────── */
.attach-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: .6rem;
  margin-top: 1rem;
  padding-top: .9rem;
  border-top: 1px solid rgba(255,255,255,.05);
}

/* hidden real input */
#file-input { display: none; }

.attach-btn {
  display: inline-flex; align-items: center; gap: .45rem;
  font-family: 'DM Mono', monospace;
  font-size: .72rem;
  letter-spacing: .04em;
  color: var(--teal2);
  background: rgba(13,148,136,.12);
  border: 1px solid rgba(13,148,136,.3);
  border-radius: 6px;
  padding: .45rem .85rem;
  cursor: pointer;
  transition: background .2s, border-color .2s, transform .15s;
  user-select: none;
}
.attach-btn:hover {
  background: rgba(13,148,136,.2);
  border-color: var(--teal2);
  transform: translateY(-1px);
}

.attach-btn svg {
  width: 13px; height: 13px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

/* chip list for attached files */
.chip-list {
  display: flex; flex-wrap: wrap; gap: .4rem;
  flex: 1;
}

.chip {
  display: inline-flex; align-items: center; gap: .35rem;
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  background: rgba(20,184,166,.1);
  border: 1px solid rgba(20,184,166,.25);
  border-radius: 20px;
  padding: .2rem .65rem .2rem .5rem;
  color: var(--teal3);
  max-width: 200px;
  animation: chipIn .2s ease;
}

@keyframes chipIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }

.chip-icon { font-size: .75rem; }

.chip-name {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 130px;
}

.chip-remove {
  background: none; border: none; cursor: pointer;
  color: rgba(94,234,212,.5);
  font-size: .8rem;
  line-height: 1;
  padding: 0;
  transition: color .15s;
  flex-shrink: 0;
}
.chip-remove:hover { color: var(--teal3); }

/* ─── ACTIONS ROW ─────────────────────────────────────────── */
.actions-row {
  display: flex; align-items: center; gap: .8rem;
  margin-top: 1rem;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex; align-items: center; gap: .5rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: .88rem;
  padding: .65rem 1.4rem;
  border: none; border-radius: 7px; cursor: pointer;
  background: linear-gradient(135deg, var(--teal), var(--teal2));
  color: var(--darker);
  transition: transform .15s, opacity .2s, box-shadow .2s;
  box-shadow: 0 2px 14px rgba(13,148,136,.35);
}
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(13,148,136,.5);
}
.btn-primary:disabled { opacity: .55; cursor: not-allowed; }

.btn-primary svg {
  width: 14px; height: 14px;
  fill: none; stroke: currentColor;
  stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
}

.btn-secondary {
  display: inline-flex; align-items: center; gap: .5rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: .88rem;
  padding: .65rem 1.4rem;
  border: 1px solid rgba(20,184,166,.4);
  border-radius: 7px; cursor: pointer;
  background: rgba(20,184,166,.08);
  color: var(--teal2);
  transition: transform .15s, opacity .2s, box-shadow .2s, background .2s, border-color .2s;
}
.btn-secondary:hover:not(:disabled) {
  background: rgba(20,184,166,.15);
  border-color: var(--teal2);
  transform: translateY(-2px);
  box-shadow: 0 2px 12px rgba(20,184,166,.25);
}
.btn-secondary:disabled { 
  opacity: .4; 
  cursor: not-allowed;
  background: rgba(20,184,166,.04);
  border-color: rgba(20,184,166,.2);
}

.btn-secondary svg {
  width: 14px; height: 14px;
  fill: none; stroke: currentColor;
  stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
}

.status-msg {
  font-family: 'DM Mono', monospace;
  font-size: .7rem;
  color: var(--muted);
  display: flex; align-items: center; gap: .35rem;
}

/* ─── SPINNER ─────────────────────────────────────────────── */
.spinner {
  display: inline-block;
  width: 11px; height: 11px;
  border: 2px solid rgba(148,163,184,.25);
  border-top-color: var(--teal2);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── OUTPUT BOX ──────────────────────────────────────────── */
.output-box {
  background: rgba(7,15,30,.65);
  padding: 1rem 1.1rem;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,.05);
  min-height: 120px;
  white-space: pre-wrap;
  word-wrap: break-word;
  line-height: 1.7;
  font-size: .9rem;
  color: #cbd5e1;
}

.output-box.placeholder { color: rgba(148,163,184,.35); font-style: italic; }

/* source count badge */
.source-badge {
  display: inline-flex; align-items: center; gap: .35rem;
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  color: var(--teal3);
  background: rgba(13,148,136,.1);
  border: 1px solid rgba(13,148,136,.2);
  border-radius: 20px;
  padding: .18rem .6rem;
  margin-top: .7rem;
}

/* ─── FOOTER ──────────────────────────────────────────────── */
footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 1.5rem 1rem 2rem;
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  color: rgba(148,163,184,.3);
  letter-spacing: .05em;
}

/* ─── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 600px) {
  nav { padding: .8rem 1rem; }
  .nav-badge { display: none; }
  .container { padding: 80px 12px 50px; }
  .panel-inner { padding: 1rem; }
  .actions-row { flex-direction: column; align-items: stretch; }
  .btn-primary { justify-content: center; }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">Qy<span>ro</span><span class="logo-badge">RAG v1.0</span></a>
  <div class="nav-right">
    <div class="status-dot">Ready</div>
    <a href="/" class="nav-cta">← Home</a>
  </div>
</nav>

<div class="container">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h2>🤖 Query Understanding & Retrieval Operator</h2>
    <p>Ask any question and get instant answers based on your study materials</p>
  </div>

  <!-- INPUT PANEL -->
  <div class="panel">
    <div class="panel-inner">
      <div class="section-label">Enter a Query</div>

      <textarea id="query" placeholder="e.g. Tell me top 10 important questions of compiler design?"></textarea>
      <div class="input-hint">Ctrl+Enter to run</div>

      <!-- ATTACH BAR -->
      <div class="attach-bar">
        <input type="file" id="file-input" multiple accept=".pdf,.txt">
        <label for="file-input" class="attach-btn">
          <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
           Upload PDF/TXT Files
        </label>
        <div class="chip-list" id="chip-list"></div>
      </div>

      <!-- ACTIONS -->
      <div class="actions-row">
        <button id="upload-btn" class="btn-secondary" disabled>
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Build Index
        </button>
        <button id="run" class="btn-primary">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Get Answer
        </button>
        <div id="status" class="status-msg"></div>
      </div>
    </div>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="panel">
    <div class="panel-inner">
      <div class="section-label">Answer</div>
      <div class="output-box placeholder" id="answer">Your answer will appear here…</div>
      <div id="source-info"></div>
    </div>
  </div>

</div>

<footer>Qyro · RAG Study Planner · Batch 2021–2026</footer>

<script>
/* ─── FILE ATTACHMENT LOGIC ─────────────────────────────── */
const fileInput   = document.getElementById('file-input');
const chipList    = document.getElementById('chip-list');
const uploadBtn   = document.getElementById('upload-btn');
let attachedFiles = []; // DataTransfer-style accumulator

fileInput.addEventListener('change', () => {
  Array.from(fileInput.files).forEach(f => {
    if (!attachedFiles.find(x => x.name === f.name && x.size === f.size)) {
      attachedFiles.push(f);
      addChip(f);
    }
  });
  // reset so same file can be re-added after removal
  fileInput.value = '';
  updateUploadButtonState();
});

function updateUploadButtonState() {
  uploadBtn.disabled = attachedFiles.length === 0;
}

function addChip(file) {
  const isPdf = file.type === 'application/pdf';
  const icon  = isPdf ? '📄' : '📝';

  const chip = document.createElement('span');
  chip.className = 'chip';
  chip.dataset.name = file.name;
  chip.innerHTML = `
    <span class="chip-icon">${icon}</span>
    <span class="chip-name" title="${file.name}">${file.name}</span>
    <button class="chip-remove" title="Remove">&times;</button>
  `;
  chip.querySelector('.chip-remove').addEventListener('click', () => {
    attachedFiles = attachedFiles.filter(f => !(f.name === file.name && f.size === file.size));
    chip.remove();
    updateUploadButtonState();
  });
  chipList.appendChild(chip);
}

/* ─── UPLOAD HANDLER ────────────────────────────────────── */
async function uploadFiles() {
  if (attachedFiles.length === 0) {
    alert('No files to upload.');
    return;
  }

  uploadBtn.disabled = true;
  runBtn.disabled = true;
  statusEl.innerHTML = '<span class="spinner"></span>Uploading and creating index…';
  answerEl.textContent = '⏳ Processing your files...\n\nPlease wait while we upload your documents and build the search index.';
  answerEl.classList.remove('placeholder');
  sourceEl.innerHTML = '';

  try {
    const formData = new FormData();
    attachedFiles.forEach(f => formData.append('files', f));

    const resp = await fetch('/api/upload', {
      method: 'POST',
      body: formData
    });

    if (!resp.ok) {
      const err = await resp.json();
      answerEl.textContent = `❌ Error: ${err.detail || resp.statusText}`;
      statusEl.textContent = '❌ Upload failed';
      uploadBtn.disabled = false;
      runBtn.disabled = false;
      return;
    }

    const data = await resp.json();

    if (data.success) {
      answerEl.textContent = `✅ ${data.message}\n\nUploaded files:\n${data.uploaded_files.map(f => '  • ' + f).join('\n')}\n\nYou can now ask questions about your documents!`;
      statusEl.textContent = '✓ Done';
      
      // Clear attached files after successful upload
      attachedFiles = [];
      chipList.innerHTML = '';
      updateUploadButtonState();
      
      sourceEl.innerHTML = `<div class="source-badge">✓ ${data.uploaded_files.length} file(s) indexed</div>`;
    } else {
      answerEl.textContent = `❌ Upload failed: ${data.message}`;
      statusEl.textContent = '❌ Error';
    }

  } catch (err) {
    answerEl.textContent = '❌ Error: ' + err.message;
    statusEl.textContent = '❌ Network error';
  }

  uploadBtn.disabled = attachedFiles.length === 0;
  runBtn.disabled = false;
}

/* ─── ANSWER LOGIC ──────────────────────────────────────── */
const runBtn    = document.getElementById('run');
const statusEl  = document.getElementById('status');
const answerEl  = document.getElementById('answer');
const queryEl   = document.getElementById('query');
const sourceEl  = document.getElementById('source-info');

async function getAnswer() {
  const q = queryEl.value.trim();
  if (!q) { alert('Please enter a question.'); return; }

  runBtn.disabled  = true;
  uploadBtn.disabled = true;
  statusEl.innerHTML = '<span class="spinner"></span>Searching…';
  answerEl.textContent = 'Processing…';
  answerEl.classList.remove('placeholder');
  sourceEl.innerHTML = '';

  try {
    const resp = await fetch('/api/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ query: q, top_k: 5 })
    });

    if (!resp.ok) {
      answerEl.textContent = `Error: ${resp.status} ${resp.statusText}`;
      statusEl.textContent = '❌ Error';
      return;
    }

    const data = await resp.json();

    if (data.success) {
      answerEl.textContent = data.answer || 'No answer generated.';
      statusEl.textContent = '✓ Done';
      if (data.num_chunks) {
        sourceEl.innerHTML = `<div class="source-badge">◈ ${data.num_chunks} sources retrieved</div>`;
      }
    } else {
      answerEl.textContent = data.answer || 'Error generating answer.';
      statusEl.textContent = '❌ Error';
    }

  } catch (err) {
    answerEl.textContent = 'Error: ' + err.message;
    statusEl.textContent = '❌ Network error';
  }

  runBtn.disabled = false;
  uploadBtn.disabled = attachedFiles.length === 0;
}

/* ─── EVENT LISTENERS ──────────────────────────────────── */
uploadBtn.addEventListener('click', uploadFiles);

runBtn.addEventListener('click', getAnswer);

queryEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    getAnswer();
  }
});

// Initialize button state on page load
updateUploadButtonState();
</script>

</body>
</html>
